<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Panel Admin{% endblock %} - Analisis Cerdas</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Admin specific styles */
        body {
            background-color: var(--background-light);
        }
        .admin-sidebar {
            background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
            color: var(--text-color-light);
            min-height: 100vh;
            padding-top: 20px;
            width: 280px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        .admin-sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 10px;
            margin: 5px 10px;
        }
        .admin-sidebar .nav-link.active,
        .admin-sidebar .nav-link:hover {
            color: var(--white-color);
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }
        .admin-sidebar .nav-link i {
            margin-right: 10px;
        }
        .admin-content {
            padding: 30px;
            flex-grow: 1;
        }
        .admin-content .card {
            border-radius: var(--border-radius);
            border: none;
            box-shadow: var(--shadow);
        }
        .admin-content .card-header {
            background-color: var(--white-color);
            border-bottom: 1px solid var(--background-dark);
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--primary-color);
            padding: 1.25rem 1.5rem;
        }
        .admin-content h1 {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 30px;
        }
        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            box-shadow: 0 4px 15px rgba(0, 92, 151, 0.4);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 25px rgba(0, 92, 151, 0.5);
        }
        .btn-success {
            background-color: #28a745;
            border-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
            border-color: #1e7e34;
        }
        .btn-info {
            background-color: #17a2b8;
            border-color: #17a2b8;
        }
        .btn-info:hover {
            background-color: #138496;
            border-color: #117a8b;
        }
        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }
        .btn-danger:hover {
            background-color: #c82333;
            border-color: #bd2130;
        }
        .badge-success {
            background-color: #28a745 !important;
        }
        .badge-secondary {
            background-color: #6c757d !important;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="admin-sidebar p-3">
            <h4 class="text-center mb-4 text-white"><i class="fas fa-cogs me-2"></i>Panel Admin</h4>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}" href="{{ url_for('admin_dashboard') }}">
                        <i class="fas fa-tachometer-alt"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'admin_users' %}active{% endif %}" href="{{ url_for('admin_users') }}">
                        <i class="fas fa-users"></i>Manajemen Pengguna
                    </a>
                </li>
                <li class="nav-item">
                    <hr class="my-3 border-light opacity-25">
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}">
                        <i class="fas fa-arrow-left"></i>Kembali ke Aplikasi
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('logout') }}">
                        <i class="fas fa-sign-out-alt"></i>Logout
                    </a>
                </li>
            </ul>
        </div>

        <!-- Page Content -->
        <div class="admin-content">
            <!-- Flash Messages -->
            <div class="container-fluid mt-3">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>

            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
